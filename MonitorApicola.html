<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <title>Monitor de Colmeias</title>

  <style>
    body {
      background: #111;
      font-family: sans-serif;
      color: white;
      margin: 0;
    }

    /* GRID */
    .grid {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 12px;
      padding: 30px;
    }

    /* CARD */
    .card {
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* HEX */
    .hex {
      width: 35px;
      height: 35px;
      background: #555;
      clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%);
      transition: 0.3s;
    }

    /* estados */
    .red {
      background: #e74c3c;
      box-shadow: 0 0 10px #e74c3c;
    }
  </style>
</head>

<body>

  <h2 style="padding:20px;">Monitor em tempo real</h2>

  <div class="grid">
    <div class="card">
      <div id="h1" class="hex"></div>
    </div>
    <div class="card">
      <div class="hex"></div>
    </div>
    <div class="card">
      <div class="hex"></div>
    </div>
    <div class="card">
      <div class="hex"></div>
    </div>
    <div class="card">
      <div class="hex"></div>
    </div>
    <div class="card">
      <div class="hex"></div>
    </div>
  </div>

  <script>
    const ws = new WebSocket("ws://localhost:3000");
    const hive1 = document.getElementById("h1");

    ws.onopen = () => {
      console.log("Conectado ao servidor");
    };

    ws.onmessage = (event) => {
      console.log("Mensagem recebida:", event.data);

      // qualquer mensagem = toque detectado
      hive1.classList.add("red");

      setTimeout(() => {
        hive1.classList.remove("red");
      }, 5000);
    };

    ws.onerror = (err) => {
      console.error("Erro:", err);
    };

    ws.onclose = () => {
      console.log("Desconectado");
    };
  </script>

</body>

</html>
